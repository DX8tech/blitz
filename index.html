<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookend Blitz</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0077; --bg: #0a0b10; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .screen { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .hidden { display: none !important; }
        .btn { background: var(--pink); color: white; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        input { background: none; border: 1px solid var(--cyan); color: white; padding: 10px; text-align: center; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 20px; }
        .letter-btn { background: none; border: 1px solid var(--cyan); color: var(--cyan); padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="scr-menu" class="screen">
        <h1 style="color: var(--cyan);">BOOKEND BLITZ</h1>
        <input type="text" id="matchIdInput" placeholder="ENTER ID (e.g. 1)">
        <button class="btn" onclick="joinMatch()">START DUEL</button>
    </div>

    <div id="scr-wait" class="screen hidden">
        <h2 style="color: var(--pink);">WAITING FOR OPPONENT...</h2>
        <p>Match ID: <span id="displayId"></span></p>
    </div>

    <div id="scr-game" class="screen hidden">
        <h3 id="msg">PICK A LETTER</h3>
        <div class="grid" id="grid"></div>
        <div id="playArea" class="hidden">
            <h1 style="font-size: 4rem;"><span id="l1">?</span> <span id="l2">?</span></h1>
            <input type="text" id="wordIn" placeholder="Type word..." style="width: 80%;">
        </div>
    </div>

    <script>
        const SB_URL = 'https://daalqqpmmoxdwyvlexqds.supabase.co';
        const SB_KEY = 'sb_publishable_Izh14BTFS2N8LHmPAigfbw_fdQnzJ-P';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let matchId = '', playerRole = '';

        async function joinMatch() {
            matchId = document.getElementById('matchIdInput').value.trim();
            if (!matchId) return;

            // FORCE SCREEN SWITCH
            document.getElementById('displayId').innerText = matchId;
            document.getElementById('scr-menu').classList.add('hidden');
            document.getElementById('scr-wait').classList.remove('hidden');

            try {
                // Check database
                const { data: match } = await supabaseClient.from('matches').select('*').eq('match_id', matchId).maybeSingle();

                if (!match) {
                    playerRole = 'p1';
                    await supabaseClient.from('matches').insert([{ match_id: matchId, status: 'waiting' }]);
                } else {
                    playerRole = 'p2';
                    await supabaseClient.from('matches').update({ status: 'active' }).eq('match_id', matchId);
                }

                // Subscribe
                supabaseClient.channel(`match-${matchId}`)
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'matches', filter: `match_id=eq.${matchId}` }, payload => {
                        handleUpdate(payload.new);
                    }).subscribe();

            } catch (err) {
                console.error(err);
            }
        }

        function handleUpdate(data) {
            if (data.status === 'active') {
                document.getElementById('scr-wait').classList.add('hidden');
                document.getElementById('scr-game').classList.remove('hidden');
                setupGrid();
            }
            if (data.p1_letter && data.p2_letter) {
                document.getElementById('l1').innerText = data.p1_letter;
                document.getElementById('l2').innerText = data.p2_letter;
                document.getElementById('grid').classList.add('hidden');
                document.getElementById('playArea').classList.remove('hidden');
            }
        }

        function setupGrid() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement('button'); b.className = 'letter-btn'; b.innerText = l;
                b.onclick = async () => {
                    const obj = {}; obj[`${playerRole}_letter`] = l;
                    await supabaseClient.from('matches').update(obj).eq('match_id', matchId);
                    g.classList.add('hidden');
                    document.getElementById('msg').innerText = "WAITING FOR OTHER PLAYER...";
                };
                g.appendChild(b);
            });
        }
    </script>
</body>
</html>
