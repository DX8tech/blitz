<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bookend Blitz: Peer Duel</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0077; --bg: #0a0b10; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; overflow: hidden; }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .hidden { display: none !important; }
        .container { border: 2px solid var(--pink); border-radius: 15px; padding: 15px; width: 90%; max-width: 400px; background: rgba(255,255,255,0.05); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .letter-btn { background: none; border: 1px solid var(--cyan); color: var(--cyan); padding: 12px 0; cursor: pointer; }
        .display { font-size: 3.5rem; font-weight: bold; margin: 15px 0; }
        .btn-main { background: var(--pink); color: white; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        input { background: none; border: 1px solid var(--cyan); color: white; padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="scr-menu" class="screen">
        <h1 style="color: var(--cyan);">BOOKEND BLITZ</h1>
        <p style="font-size: 0.8rem; color: #666;">Status: <span id="peerStatus">Connecting...</span></p>
        <div id="setupArea" class="hidden">
            <input type="text" id="joinId" placeholder="ENTER OPPONENT ID">
            <button class="btn-main" onclick="connectToPeer()">CONNECT & PLAY</button>
            <p style="margin-top: 20px;">YOUR ID: <b id="myId" style="color: var(--pink);">...</b></p>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div id="msg">PICK A LETTER</div>
        <div class="grid" id="grid"></div>
        <div id="playArea" class="hidden">
            <div class="display"><span id="l1">?</span> <span id="l2">?</span></div>
            <input type="text" id="wordIn" placeholder="Type word...">
        </div>
    </div>

    <script>
        let peer, conn, myId;
        const gridLetters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

        // 1. Initialize Peer
        peer = new Peer();

        peer.on('open', (id) => {
            myId = id;
            document.getElementById('myId').innerText = id;
            document.getElementById('peerStatus').innerText = "Online";
            document.getElementById('setupArea').classList.remove('hidden');
        });

        // 2. Handle Incoming Connection (Player 2)
        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
            switchScreen('scr-game');
            setupGrid();
        });

        // 3. Connect to Opponent (Player 1)
        function connectToPeer() {
            const targetId = document.getElementById('joinId').value.trim();
            conn = peer.connect(targetId);
            setupConnection();
            switchScreen('scr-game');
            setupGrid();
        }

        function setupConnection() {
            conn.on('data', (data) => {
                if (data.type === 'letter') handleLetterReceived(data.val);
            });
        }

        function setupGrid() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            gridLetters.forEach(l => {
                const b = document.createElement('button'); b.className = 'letter-btn'; b.innerText = l;
                b.onclick = () => {
                    conn.send({ type: 'letter', val: l });
                    handleLetterReceived(l);
                    g.classList.add('hidden');
                };
                g.appendChild(b);
            });
        }

        let receivedLetters = [];
        function handleLetterReceived(l) {
            receivedLetters.push(l);
            if (receivedLetters.length === 2) {
                document.getElementById('l1').innerText = receivedLetters[0];
                document.getElementById('l2').innerText = receivedLetters[1];
                document.getElementById('grid').classList.add('hidden');
                document.getElementById('playArea').classList.remove('hidden');
            }
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
