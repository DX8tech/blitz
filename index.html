<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bookend Blitz: Tournament</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0077; --gold: #ffcc00; --bg: #0a0b10; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; overflow: hidden; user-select: none; }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .hidden { display: none !important; }
        .container { border: 2px solid var(--pink); border-radius: 15px; padding: 15px; width: 90%; max-width: 400px; background: rgba(255,255,255,0.05); box-shadow: 0 0 15px var(--pink); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .letter-btn { background: none; border: 1px solid var(--cyan); color: var(--cyan); padding: 12px 0; cursor: pointer; font-weight: bold; position: relative; }
        .x2-tag { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 0.6rem; padding: 2px 4px; border-radius: 3px; }
        .display { font-size: 4rem; font-weight: bold; margin: 10px 0; text-shadow: 0 0 15px white; letter-spacing: 5px; }
        input { background: none; border: none; border-bottom: 2px solid var(--pink); color: white; font-size: 1.8rem; text-align: center; outline: none; margin: 10px; width: 85%; }
        .btn-main { background: var(--pink); color: white; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; box-shadow: 0 0 10px var(--pink); }
        .btn-submit { background: var(--cyan); color: black; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 85%; margin-top: 10px; font-size: 1.2rem; }
        .stats { color: var(--gold); font-weight: bold; margin-bottom: 10px; font-size: 1.2rem; }
        #history { margin-top: 15px; font-size: 0.9rem; color: var(--cyan); font-weight: bold; }
        #scorePop { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 7rem; font-weight: bold; opacity: 0; z-index: 100; pointer-events: none; }
        .pop-anim { animation: scoreFloat 0.8s ease-out forwards; }
        @keyframes scoreFloat { 0% { opacity:0; transform:translate(-50%,0); } 50% { opacity:1; } 100% { opacity:0; transform:translate(-50%,-100px); } }
    </style>
</head>
<body>

    <div id="scr-menu" class="screen">
        <h1 style="color: var(--cyan); text-shadow: 0 0 15px var(--cyan);">BOOKEND BLITZ</h1>
        <div id="setupArea" class="hidden">
            <p style="color: var(--gold); margin: 0;">YOUR DUEL ID</p>
            <div id="myId" style="font-size: 3rem; font-weight: bold; letter-spacing: 5px;">....</div>
            <hr style="width: 60%; border: 0.5px solid #333; margin: 20px;">
            <input type="text" id="joinId" placeholder="ENTER OPPONENT ID" autocomplete="off">
            <br>
            <button class="btn-main" onclick="connectToPeer()">START DUEL</button>
        </div>
        <p id="peerLog" style="font-size: 0.8rem; color: #444; margin-top: 20px;">Syncing Peer Engine...</p>
    </div>

    <div id="scr-game" class="screen hidden">
        <div class="stats">SCORE: <span id="curScore">0</span></div>
        <div class="container">
            <div id="msg" style="color: var(--cyan); font-weight: bold;">CHOOSE BOOKEND</div>
            <div class="grid" id="grid"></div>
            <div id="playArea" class="hidden">
                <div class="display"><span id="l1" style="color: var(--cyan);">?</span><span id="l2" style="color: var(--pink);">?</span></div>
                <input type="text" id="wordIn" placeholder="..." autocomplete="off">
                <br>
                <button class="btn-submit" onclick="validateAndSubmit()">SUBMIT WORD</button>
                <div id="history"></div>
            </div>
        </div>
    </div>

    <div id="scorePop"></div>
    <audio id="music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <script>
        const CENSORED = ["arse","arsehole","ass","asshole","bastard","bitch","bloody","bollocks","bugger","bullshit","crap","damn","dick","dickhead","dyke","fag","faggot","fuck","fucker","fucking","goddamn","hell","homo","jerk","kike","knob","muff","paki","piss","pissed","poof","puss","pussy","queer","retard","scrotum","shag","shit","shite","shitter","slag","slut","spastic","spic","tart","tits","turd","twat","wank","wanker","whore"];

        let peer, conn, myShortId, myLetter = null, oppLetter = null, myScore = 0;
        const hards = ['X', 'Z', 'Q'];
        const audio = document.getElementById('music');
        let aCtx;

        myShortId = Math.floor(1000 + Math.random() * 9000).toString();
        peer = new Peer('blitz-' + myShortId);

        peer.on('open', () => {
            document.getElementById('myId').innerText = myShortId;
            document.getElementById('setupArea').classList.remove('hidden');
            document.getElementById('peerLog').innerText = "System Online";
        });

        peer.on('connection', (c) => {
            conn = c;
            initAudio();
            setupConn();
            switchScreen('scr-game');
            setupGrid();
        });

        function connectToPeer() {
            const tid = document.getElementById('joinId').value.trim();
            if (!tid) return;
            initAudio();
            conn = peer.connect('blitz-' + tid);
            setupConn();
            switchScreen('scr-game');
            setupGrid();
        }

        function setupConn() {
            conn.on('data', (data) => {
                if (data.type === 'letter') {
                    oppLetter = data.val;
                    conn.send({type: 'sync-check', val: myLetter});
                    checkSync();
                }
                if (data.type === 'sync-check') {
                    oppLetter = data.val;
                    checkSync();
                }
                if (data.type === 'next') resetRound();
            });
        }

        function setupGrid() {
            const g = document.getElementById('grid'); g.innerHTML = "";
            document.getElementById('grid').classList.remove('hidden');
            document.getElementById('playArea').classList.add('hidden');
            document.getElementById('msg').innerText = "CHOOSE BOOKEND";

            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement('button'); b.className = 'letter-btn'; b.innerText = l;
                if (hards.includes(l)) b.innerHTML += `<span class="x2-tag">x2</span>`;
                b.onclick = () => {
                    myLetter = l;
                    conn.send({ type: 'letter', val: l });
                    g.classList.add('hidden');
                    document.getElementById('msg').innerText = "WAITING...";
                    checkSync();
                };
                g.appendChild(b);
            });
        }

        function checkSync() {
            if (myLetter && oppLetter) {
                document.getElementById('l1').innerText = myLetter;
                document.getElementById('l2').innerText = oppLetter;
                document.getElementById('msg').innerText = "GO!";
                document.getElementById('playArea').classList.remove('hidden');
                document.getElementById('wordIn').value = "";
                document.getElementById('wordIn').focus();
            }
        }

        async function validateAndSubmit() {
            const w = document.getElementById('wordIn').value.toUpperCase().trim();
            const validLetters = (w.startsWith(myLetter) && w.endsWith(oppLetter)) || (w.startsWith(oppLetter) && w.endsWith(myLetter));
            
            if (!validLetters || w.length < 2) return sfx(false);

            try {
                const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w.toLowerCase()}`);
                if (r.ok) {
                    let mult = (hards.includes(myLetter) || hards.includes(oppLetter)) ? 2 : 1;
                    let base = w.length <= 4 ? 1 : w.length <= 7 ? 2 : 4;
                    let final = base * mult;
                    
                    myScore += final;
                    document.getElementById('curScore').innerText = myScore;
                    
                    const censored = CENSORED.includes(w.toLowerCase()) ? "◆".repeat(w.length) : w;
                    document.getElementById('history').innerText = `Last: ${censored}`;
                    
                    sfx(true);
                    showPop(final);
                    if (final >= 4) confetti({ origin: { y: 0.7 } });
                    
                    conn.send({ type: 'next' });
                    resetRound();
                } else {
                    sfx(false);
                }
            } catch {
                conn.send({ type: 'next' });
                resetRound();
            }
        }

        document.getElementById('wordIn').onkeydown = (e) => {
            if (e.key === "Enter") validateAndSubmit();
        };

        function resetRound() {
            myLetter = null; oppLetter = null;
            setupGrid();
        }

        function showPop(p) {
            const pop = document.getElementById('scorePop'); pop.innerText = "+" + p;
            pop.style.color = p >= 4 ? 'var(--gold)' : 'white';
            pop.classList.add('pop-anim');
            setTimeout(() => pop.classList.remove('pop-anim'), 800);
        }

        function initAudio() {
            if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
            audio.volume = 0.2; audio.play().catch(()=>{});
        }

        function sfx(win) {
            if (!aCtx) return;
            const o = aCtx.createOscillator(); const g = aCtx.createGain();
            o.connect(g); g.connect(aCtx.destination);
            o.frequency.setValueAtTime(win ? 600 : 120, aCtx.currentTime);
            g.gain.setValueAtTime(0.1, aCtx.currentTime);
            o.start(); o.stop(aCtx.currentTime + 0.2);
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
