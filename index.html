<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bookend Blitz: Tournament v11</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0077; --gold: #ffcc00; --bg: #0a0b10; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; overflow: hidden; user-select: none; }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; overflow-y: auto; }
        .hidden { display: none !important; }
        .container { border: 2px solid var(--pink); border-radius: 15px; padding: 15px; width: 95%; max-width: 450px; background: rgba(255,255,255,0.05); transition: transform 0.1s; }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .letter-btn { background: none; border: 1px solid var(--cyan); color: var(--cyan); padding: 12px 0; cursor: pointer; font-weight: bold; position: relative; }
        .letter-btn:disabled { border-color: #333; color: #333; text-decoration: line-through; }
        .x2-tag { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 0.6rem; padding: 2px 4px; border-radius: 3px; }
        .display { font-size: 4rem; font-weight: bold; margin: 5px 0; text-shadow: 0 0 15px white; letter-spacing: 5px; }
        input { background: none; border: none; border-bottom: 2px solid var(--pink); color: white; font-size: 1.8rem; text-align: center; outline: none; margin: 10px; width: 85%; }
        .btn-main { background: var(--pink); color: white; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .btn-submit { background: var(--cyan); color: black; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 85%; margin-top: 10px; font-size: 1.2rem; }
        .stats-bar { display: flex; justify-content: space-around; width: 100%; max-width: 450px; color: var(--gold); font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; }
        .timer-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; margin: 10px 0; }
        #timerBar { width: 100%; height: 100%; background: var(--cyan); transition: width 0.1s linear; }
        .summary-scroll { width: 95%; max-width: 450px; margin-top: 20px; text-align: left; max-height: 350px; overflow-y: auto; }
        .round-box { margin-bottom: 15px; border: 1px solid #333; border-radius: 8px; padding: 10px; background: rgba(255,255,255,0.02); }
        .round-title { font-size: 0.8rem; color: var(--gold); border-bottom: 1px solid #333; margin-bottom: 5px; }
        .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.75rem; }
        .p-word { border-left: 2px solid var(--cyan); padding-left: 5px; margin-bottom: 2px; display: block; }
        .o-word { border-left: 2px solid var(--pink); padding-left: 5px; margin-bottom: 2px; display: block; }
        #scorePop { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 7rem; font-weight: bold; opacity: 0; z-index: 100; pointer-events: none; }
        .pop-anim { animation: scoreFloat 0.8s ease-out forwards; }
        @keyframes scoreFloat { 0% { opacity:0; transform:translate(-50%,0); } 50% { opacity:1; } 100% { opacity:0; transform:translate(-50%,-100px); } }
    </style>
</head>
<body>

    <div id="scr-menu" class="screen">
        <h1 style="color: var(--cyan); text-shadow: 0 0 15px var(--cyan);">BOOKEND BLITZ</h1>
        <div id="setupArea" class="hidden">
            <p style="color: var(--gold); margin: 0;">DUEL ID</p>
            <div id="myId" style="font-size: 3.5rem; font-weight: bold; letter-spacing: 5px;">....</div>
            <hr style="width: 60%; border: 0.5px solid #333; margin: 20px;">
            <input type="text" id="joinId" placeholder="ENTER ID" autocomplete="off">
            <button class="btn-main" onclick="connectToPeer()">START DUEL</button>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div class="stats-bar">
            <div>RD: <span id="rdDisp">1</span>/10</div>
            <div>YOU: <span id="myScoreDisp">0</span></div>
            <div>OPP: <span id="oppScoreDisp">0</span></div>
        </div>
        <div class="container" id="gameCont">
            <div id="msg" style="color: var(--cyan); font-weight: bold;">PICK LETTER</div>
            <div class="grid" id="grid"></div>
            <div id="playArea" class="hidden">
                <div class="timer-bg"><div id="timerBar"></div></div>
                <div class="display"><span id="l1" style="color: var(--cyan);">?</span><span id="l2" style="color: var(--pink);">?</span></div>
                <input type="text" id="wordIn" placeholder="..." autocomplete="off">
                <button class="btn-submit" onclick="validateAndSubmit()">SUBMIT</button>
                <div id="history" style="margin-top:10px; font-weight:bold; color:var(--cyan); font-size:0.8rem;"></div>
            </div>
        </div>
    </div>

    <div id="scr-end" class="screen hidden">
        <h1 id="endTitle" style="color: var(--gold);">MATCH OVER</h1>
        <div id="finalResult" style="font-size: 1.5rem; color: white;"></div>
        <div class="summary-scroll" id="summaryScroll"></div>
        <button class="btn-main" onclick="location.reload()">REMATCH</button>
    </div>

    <div id="scorePop"></div>
    <audio id="music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <script>
        const CENSORED = ["arse","asshole","bastard","bitch","fuck","shit","wank","slut","pussy"];
        let peer, conn, myShortId, myLetter = null, oppLetter = null, myScore = 0, oppScore = 0;
        let timerInt, timeLeft = 15, roundActive = false, currentRound = 1, burnedLetters = [];
        let usedWords = []; let roundWords = { my: [], opp: [] }; let fullMatchLog = [];
        const hards = ['X', 'Z', 'Q'];
        const audio = document.getElementById('music');
        let aCtx;

        myShortId = Math.floor(1000 + Math.random() * 9000).toString();
        peer = new Peer('blitz-' + myShortId);
        peer.on('open', () => { document.getElementById('myId').innerText = myShortId; document.getElementById('setupArea').classList.remove('hidden'); });
        peer.on('connection', (c) => { conn = c; initAudio(); setupConn(); switchScreen('scr-game'); setupGrid(); });

        function connectToPeer() {
            const tid = document.getElementById('joinId').value.trim();
            if (!tid) return;
            initAudio(); conn = peer.connect('blitz-' + tid); setupConn(); switchScreen('scr-game'); setupGrid();
        }

        function setupConn() {
            conn.on('data', (data) => {
                if (data.type === 'letter') { oppLetter = data.val; burnedLetters.push(data.val); conn.send({type: 'sync', val: myLetter}); checkSync(); }
                if (data.type === 'sync') { oppLetter = data.val; checkSync(); }
                if (data.type === 'score') { oppScore = data.val; document.getElementById('oppScoreDisp').innerText = oppScore; }
                if (data.type === 'wordSync') { roundWords.opp.push(data.val); }
                if (data.type === 'roundEnd') { finishRound(); }
            });
        }

        function setupGrid() {
            if (currentRound > 10 && myScore !== oppScore) return endGame();
            const g = document.getElementById('grid'); g.innerHTML = "";
            document.getElementById('grid').classList.remove('hidden');
            document.getElementById('playArea').classList.add('hidden');
            document.getElementById('msg').innerText = currentRound > 10 ? "SUDDEN DEATH!" : "PICK LETTER";
            document.getElementById('rdDisp').innerText = currentRound;
            roundWords = { my: [], opp: [] }; usedWords = [];
            
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                const b = document.createElement('button'); b.className = 'letter-btn'; b.innerText = l;
                if (burnedLetters.includes(l)) b.disabled = true;
                if (hards.includes(l)) b.innerHTML += `<span class="x2-tag">x2</span>`;
                b.onclick = () => {
                    myLetter = l; burnedLetters.push(l); conn.send({ type: 'letter', val: l });
                    g.classList.add('hidden'); document.getElementById('msg').innerText = "WAITING...";
                    checkSync();
                };
                g.appendChild(b);
            });
        }

        function checkSync() {
            if (myLetter && oppLetter && !roundActive) {
                roundActive = true;
                document.getElementById('l1').innerText = myLetter;
                document.getElementById('l2').innerText = oppLetter;
                document.getElementById('playArea').classList.remove('hidden');
                document.getElementById('wordIn').value = ""; document.getElementById('wordIn').focus();
                startTimer();
            }
        }

        function startTimer() {
            timeLeft = 15;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timerBar').style.width = (timeLeft/15*100) + "%";
                if (timeLeft <= 0) {
                    clearInterval(timerInt);
                    conn.send({ type: 'roundEnd' });
                    finishRound();
                }
            }, 100);
        }

        function finishRound() {
            if (!roundActive) return;
            roundActive = false;
            fullMatchLog.push({ round: currentRound, letters: myLetter+oppLetter, myWords: [...roundWords.my], oppWords: [...roundWords.opp] });
            document.getElementById('playArea').classList.add('hidden');
            setTimeout(() => {
                if (currentRound >= 10 && myScore !== oppScore) endGame();
                else { currentRound++; myLetter = null; oppLetter = null; setupGrid(); }
            }, 1500);
        }

        async function validateAndSubmit() {
            initAudio();
            const w = document.getElementById('wordIn').value.toUpperCase().trim();
            const isBad = CENSORED.some(bad => w.toLowerCase().includes(bad));
            const valid = (w.startsWith(myLetter) && w.endsWith(oppLetter)) || (w.startsWith(oppLetter) && w.endsWith(myLetter));
            
            if (!valid || w.length < 2 || timeLeft <= 0 || usedWords.includes(w)) {
                sfx(false); shake(); return;
            }

            try {
                const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w.toLowerCase()}`);
                if (r.ok) {
                    usedWords.push(w);
                    let pts = (w.length <= 4 ? 1 : w.length <= 7 ? 2 : 4) * (hards.some(h => [myLetter, oppLetter].includes(h)) ? 2 : 1);
                    myScore += pts; 
                    document.getElementById('myScoreDisp').innerText = myScore;
                    conn.send({ type: 'score', val: myScore });
                    
                    const display = isBad ? "◆".repeat(w.length) : w;
                    roundWords.my.push(display);
                    conn.send({ type: 'wordSync', val: display });
                    
                    document.getElementById('history').innerText = `OK: ${display}`;
                    sfx(true); showPop(pts); if (pts >= 4) confetti({ origin: { y: 0.7 } });
                    document.getElementById('wordIn').value = "";
                } else { sfx(false); shake(); }
            } catch { sfx(true); }
        }

        function shake() {
            const c = document.getElementById('gameCont');
            c.classList.add('shake');
            setTimeout(() => c.classList.remove('shake'), 300);
        }

        function endGame() {
            switchScreen('scr-end');
            document.getElementById('finalResult').innerText = `YOU: ${myScore} | OPP: ${oppScore}`;
            document.getElementById('endTitle').innerText = myScore > oppScore ? "VICTORY!" : "DEFEAT!";
            const scroll = document.getElementById('summaryScroll');
            scroll.innerHTML = "";
            fullMatchLog.sort((a,b)=>a.round-b.round).forEach(rd => {
                scroll.innerHTML += `<div class="round-box"><div class="round-title">ROUND ${rd.round} (${rd.letters})</div>
                    <div class="comp-grid"><div><b>YOU</b><br>${rd.myWords.map(w=>`<span class="p-word">${w}</span>`).join('')}</div>
                    <div><b>OPP</b><br>${rd.oppWords.map(w=>`<span class="o-word">${w}</span>`).join('')}</div></div></div>`;
            });
            if (myScore > oppScore) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        document.getElementById('wordIn').onkeydown = (e) => { if (e.key === "Enter") validateAndSubmit(); };
        function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function initAudio() { 
            if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (aCtx.state === 'suspended') aCtx.resume();
        }
        function sfx(win) { 
            if (!aCtx) return;
            const o = aCtx.createOscillator(); const g = aCtx.createGain();
            o.connect(g); g.connect(aCtx.destination);
            o.frequency.setValueAtTime(win ? 600 : 100, aCtx.currentTime);
            g.gain.setValueAtTime(0.1, aCtx.currentTime);
            o.start(); o.stop(aCtx.currentTime + 0.3);
        }
        function showPop(p) { const pop = document.getElementById('scorePop'); pop.innerText = "+" + p; pop.classList.add('pop-anim'); setTimeout(() => pop.classList.remove('pop-anim'), 800); }
    </script>
</body>
</html>
